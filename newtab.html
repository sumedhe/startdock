<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StartDock</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0b0d14;
      --surface: #13151f;
      --border: rgba(255,255,255,0.06);
      --text: #e2e8f0;
      --text-muted: #4a5568;
      --text-sub: #718096;
      --radius: 12px;
    }

    html, body {
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 14px;
      line-height: 1.5;
    }

    body { padding: 0 0 64px; }

    /* ── Hero ── */
    .hero {
      position: relative;
      overflow: hidden;
      padding: 40px 40px 28px;
      margin-bottom: 16px;
      border-bottom: 1px solid var(--border);
    }

    .hero::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 80% at 15% 50%, rgba(59,130,246,0.07) 0%, transparent 70%),
        radial-gradient(ellipse 40% 60% at 85% 30%, rgba(139,92,246,0.06) 0%, transparent 70%);
      pointer-events: none;
    }

    .hero-inner {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 32px;
    }

    /* clock + date */
    .hero-greeting {
      font-size: 12px;
      font-weight: 500;
      color: var(--text-sub);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .hero-time {
      font-size: 68px;
      font-weight: 700;
      letter-spacing: -0.03em;
      line-height: 1;
      color: #fff;
      font-variant-numeric: tabular-nums;
    }

    .hero-time .seconds {
      font-size: 34px;
      font-weight: 400;
      color: var(--text-sub);
      vertical-align: baseline;
      margin-left: 3px;
    }

    .hero-date {
      margin-top: 10px;
      font-size: 15px;
      color: var(--text-sub);
    }

    .hero-stats {
      display: flex;
      gap: 20px;
      margin-top: 20px;
    }

    .hero-stat {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 12px;
      color: var(--text-sub);
    }

    .hero-stat-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #10B981;
      box-shadow: 0 0 6px rgba(16,185,129,0.6);
      flex-shrink: 0;
    }

    /* ── Settings button ── */
    .settings-btn {
      position: absolute;
      top: 16px;
      right: 16px;
      background: none;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-muted);
      width: 30px; height: 30px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      font-size: 14px;
      transition: border-color 0.15s, color 0.15s, background 0.15s;
      z-index: 10;
    }

    .settings-btn:hover {
      border-color: rgba(255,255,255,0.2);
      color: var(--text);
      background: rgba(255,255,255,0.04);
    }

    /* ── Calendar widget ── */
    .calendar {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 12px;
      flex-shrink: 0;
      align-self: stretch;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .cal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }

    .cal-month {
      font-size: 12px;
      font-weight: 600;
      color: var(--text);
    }

    .cal-nav {
      display: flex;
      gap: 3px;
    }

    .cal-nav button {
      background: none;
      border: 1px solid var(--border);
      border-radius: 5px;
      color: var(--text-sub);
      cursor: pointer;
      width: 20px; height: 20px;
      font-size: 11px;
      display: flex; align-items: center; justify-content: center;
      transition: border-color 0.15s, color 0.15s;
    }

    .cal-nav button:hover {
      border-color: rgba(255,255,255,0.2);
      color: var(--text);
    }

    .cal-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 1px;
      text-align: center;
    }

    .cal-dow {
      font-size: 9px;
      font-weight: 600;
      color: var(--text-muted);
      letter-spacing: 0.04em;
      padding-bottom: 4px;
      text-transform: uppercase;
    }

    .cal-day {
      font-size: 11px;
      color: var(--text-sub);
      border-radius: 4px;
      padding: 3px 1px;
      cursor: default;
      transition: background 0.1s, color 0.1s;
    }

    .cal-day:not(.empty):hover {
      background: rgba(255,255,255,0.06);
      color: var(--text);
    }

    .cal-day.today {
      background: rgba(59,130,246,0.2);
      color: #93c5fd;
      font-weight: 700;
    }

    .cal-day.empty { visibility: hidden; }

    /* ── Search bar ── */
    .hero-middle {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .search-box {
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 14px;
      width: 100%;
      max-width: 320px;
      transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
    }

    .search-box:focus-within {
      background: var(--surface);
      border-color: rgba(59,130,246,0.5);
      box-shadow: 0 0 0 3px rgba(59,130,246,0.08);
    }

    .search-icon {
      color: var(--text-muted);
      flex-shrink: 0;
      font-size: 14px;
    }

    .search-input {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      color: var(--text);
      font-size: 13px;
      font-family: inherit;
    }

    .search-input::placeholder { color: var(--text-muted); }

    .search-hint {
      font-size: 11px;
      color: var(--text-muted);
      background: rgba(255,255,255,0.05);
      border-radius: 4px;
      padding: 1px 6px;
      flex-shrink: 0;
    }

    /* ── Bookmarks grid ── */
    .grid {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      align-items: flex-start;
      padding: 0 40px;
    }

    @keyframes colIn {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .column {
      background: var(--surface);
      border: 1px solid var(--border);
      border-top: 3px solid var(--accent);
      border-radius: var(--radius);
      width: 210px;
      flex-shrink: 0;
      overflow: hidden;
      transition: border-color 0.2s, box-shadow 0.2s;
      animation: colIn 0.4s ease both;
    }

    .column:hover {
      border-color: rgba(var(--accent-rgb), 0.45);
      border-top-color: var(--accent);
      box-shadow: 0 4px 24px rgba(var(--accent-rgb), 0.08);
    }

    .column.hidden { display: none; }

    .column-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 13px 8px;
      border-bottom: 1px solid var(--border);
    }

    .column-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 6px rgba(var(--accent-rgb), 0.7);
      flex-shrink: 0;
    }

    .column-title {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--text-sub);
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .column-count {
      font-size: 10px;
      color: var(--text-muted);
      background: rgba(255,255,255,0.05);
      border-radius: 99px;
      padding: 1px 6px;
      flex-shrink: 0;
    }

    .bookmark-list {
      padding: 5px;
      display: flex;
      flex-direction: column;
      gap: 1px;
    }

    .bookmark-item {
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 6px 8px;
      border-radius: 7px;
      text-decoration: none;
      color: var(--text);
      transition: background 0.12s, color 0.12s;
    }

    .bookmark-item:hover {
      background: rgba(var(--accent-rgb), 0.1);
      color: #fff;
    }

    .bookmark-item.hidden { display: none; }

    .favicon {
      width: 15px; height: 15px;
      border-radius: 3px;
      flex-shrink: 0;
      object-fit: contain;
      opacity: 0.85;
    }

    .bookmark-item:hover .favicon { opacity: 1; }

    .bookmark-separator {
      height: 1px;
      background: rgba(255,255,255,0.07);
      margin: 3px 8px;
      flex-shrink: 0;
    }

    .bookmark-name {
      font-size: 13px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .no-results {
      padding: 0 40px 12px;
      color: var(--text-muted);
      font-size: 13px;
      display: none;
    }

    @media (max-width: 640px) {
      .hero { padding: 28px 20px 24px; }
      .hero-time { font-size: 48px; }
      .hero-time .seconds { font-size: 24px; }
      .calendar { display: none; }
      .grid { padding: 0 20px; }
      .column { width: 100%; }
    }
  </style>
</head>
<body>

  <div class="hero">
    <button class="settings-btn" id="settings-btn" title="Settings">&#9881;</button>
    <div class="hero-inner">
      <div class="hero-left">
        <div class="hero-greeting" id="greeting">Good morning</div>
        <div class="hero-time">
          <span id="clock-hm">--:--</span><span class="seconds" id="clock-s">:--</span>
        </div>
        <div class="hero-date" id="date-line"></div>
        <div class="hero-stats">
          <div class="hero-stat">
            <span class="hero-stat-dot"></span>
            <span id="bookmark-total">0</span>&nbsp;bookmarks
          </div>
          <div class="hero-stat">
            <span style="width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,0.15);display:inline-block;flex-shrink:0;"></span>
            <span id="category-total">0</span>&nbsp;categories
          </div>
        </div>
      </div>

      <div class="hero-middle">
        <div class="search-box">
          <span class="search-icon">&#9906;</span>
          <input class="search-input" id="search" type="text" placeholder="Search bookmarks…" autocomplete="off" spellcheck="false">
          <span class="search-hint" id="search-hint">/</span>
        </div>
      </div>

      <div class="calendar">
        <div class="cal-header">
          <span class="cal-month" id="cal-month-label"></span>
          <div class="cal-nav">
            <button id="cal-prev" title="Previous month">&#8249;</button>
            <button id="cal-next" title="Next month">&#8250;</button>
          </div>
        </div>
        <div class="cal-grid" id="cal-grid"></div>
      </div>
    </div>
  </div>

  <div class="no-results" id="no-results">No bookmarks match your search.</div>

  <div class="grid" id="grid"></div>

  <script src="newtab.js"></script>
</body>
</html>
